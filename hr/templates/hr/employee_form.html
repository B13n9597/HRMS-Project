<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ mode }} Employee - ACT HRMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f6f9fc; }
        .topbar { background: #025da2; }
        .panel { border: 1px solid #dbeafe; border-radius: .5rem; background: #fff; }
        .form-control:focus, .form-select:focus { border-color: #025da2; box-shadow: 0 0 0 .25rem rgba(2, 93, 162, .15); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg topbar navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/dashboard/hr/">ACT HRMS</a>
        <a class="btn btn-light btn-sm" href="/employees/">Employees</a>
    </div>
</nav>

<main class="container py-4">
    <div class="mb-4">
        <p class="text-uppercase text-primary small fw-bold mb-1">HR Manager</p>
        <h1 class="h3 mb-0">{{ mode }} Employee</h1>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <section class="panel p-4">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold" for="first_name">First name</label>
                    <input class="form-control" id="first_name" name="first_name" value="{{ employee.first_name|default:'' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold" for="last_name">Last name</label>
                    <input class="form-control" id="last_name" name="last_name" value="{{ employee.last_name|default:'' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold" for="email">Email</label>
                    <input class="form-control" id="email" name="email" type="email" value="{{ employee.user.email|default:'' }}" {% if mode == "Create" %}required{% endif %}>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold" for="password">{% if mode == "Create" %}Password{% else %}New password{% endif %}</label>
                    <input class="form-control" id="password" name="password" type="password" {% if mode == "Create" %}required{% endif %}>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold" for="employee_id">Employee ID</label>
                    <input class="form-control" id="employee_id" name="employee_id" value="{{ employee.employee_id|default:'' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold" for="attendance_pin">Attendance PIN</label>
                    <input class="form-control" id="attendance_pin" name="attendance_pin" maxlength="6" value="{{ employee.attendance_pin|default:'' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold" for="hire_date">Hire date</label>
                    <input class="form-control" id="hire_date" name="hire_date" type="date" value="{{ employee.hire_date|date:'Y-m-d' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold" for="department_id">Department</label>
                    <select class="form-select" id="department_id" name="department_id">
                        <option value="">Select department</option>
                        {% for department in departments %}
                            <option value="{{ department.id }}" {% if employee.department.id == department.id %}selected{% endif %}>{{ department.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold" for="position_id">Position</label>
                    <select class="form-select" id="position_id" name="position_id">
                        <option value="">Select position</option>
                        {% for position in positions %}
                            <option value="{{ position.id }}" {% if employee.position.id == position.id %}selected{% endif %}>{{ position.title }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold" for="role_id">Role</label>
                    <select class="form-select" id="role_id" name="role_id">
                        <option value="">Employee</option>
                        {% for role in roles %}
                            <option value="{{ role.id }}" {% if employee.role.id == role.id %}selected{% endif %}>{{ role.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold" for="status_id">Status</label>
                    <select class="form-select" id="status_id" name="status_id">
                        <option value="">Active</option>
                        {% for status in statuses %}
                            <option value="{{ status.id }}" {% if employee.status.id == status.id %}selected{% endif %}>{{ status.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold" for="phone">Phone</label>
                    <input class="form-control" id="phone" name="phone" value="{{ employee.phone|default:'' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold" for="address">Address</label>
                    <input class="form-control" id="address" name="address" value="{{ employee.address|default:'' }}">
                </div>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-4">
                <a class="btn btn-outline-secondary" href="/employees/">Cancel</a>
                <button class="btn btn-primary" type="submit">{{ mode }} employee</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
