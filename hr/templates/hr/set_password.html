<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Your Password – HRMS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            width: 100%;
            max-width: 420px;
        }
        h2 { color: #1a1a2e; margin-bottom: 0.5rem; font-size: 1.5rem; }
        p.sub { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.85rem; color: #333; margin-bottom: 0.3rem; font-weight: 600; }
        input[type=password] {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 1rem;
            transition: border-color 0.2s;
        }
        input[type=password]:focus { border-color: #4f46e5; outline: none; }
        button {
            width: 100%;
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.8rem;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background: #3730a3; }
        .messages { margin-bottom: 1rem; }
        .messages li {
            padding: 0.6rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            list-style: none;
            margin-bottom: 0.4rem;
        }
        .messages .error   { background: #fee2e2; color: #b91c1c; }
        .messages .success { background: #d1fae5; color: #065f46; }
    </style>
</head>
<body>
<div class="card">
    <h2>Set Your Password</h2>
    <p class="sub">Choose a strong password to activate your HRMS account.</p>

    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
        <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <label for="password1">New Password</label>
        <input type="password" id="password1" name="password1" placeholder="At least 8 characters" required>

        <label for="password2">Confirm Password</label>
        <input type="password" id="password2" name="password2" placeholder="Repeat your password" required>

        <button type="submit">Set Password & Activate Account</button>
    </form>
</div>
</body>
</html>
